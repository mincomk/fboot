name: release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            target: x86_64-linux
            triple: x86_64-unknown-linux-musl
          - runner: ubuntu-24.04-arm
            target: aarch64-linux
            triple: aarch64-unknown-linux-musl
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: fboot/pnpm-lock.yaml

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.triple }}

      - name: Install musl tools
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: fbootd

      - name: Build (frontend + embedded binary)
        run: ./build.sh
        env:
          CARGO_BUILD_TARGET: ${{ matrix.triple }}

      - name: Stage binary
        run: |
          mkdir -p dist
          cp "fbootd/target/${{ matrix.triple }}/release/fbootd" "dist/fbootd-${{ matrix.target }}"

      - uses: actions/upload-artifact@v4
        with:
          name: fbootd-${{ matrix.target }}
          path: dist/fbootd-${{ matrix.target }}
          if-no-files-found: error

      - name: Publish to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/fbootd-${{ matrix.target }}
