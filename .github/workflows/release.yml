name: release

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            target: x86_64-linux
            triple: x86_64-unknown-linux-musl
            deb_arch: amd64
          - runner: ubuntu-24.04-arm
            target: aarch64-linux
            triple: aarch64-unknown-linux-musl
            deb_arch: arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: fboot/pnpm-lock.yaml

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.triple }}

      - name: Install musl tools
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: fbootd
          shared-key: musl-${{ matrix.target }}

      - name: Build (frontend + embedded binary)
        run: ./build.sh
        env:
          CARGO_BUILD_TARGET: ${{ matrix.triple }}

      - name: Stage binary
        run: |
          mkdir -p dist
          cp "fbootd/target/${{ matrix.triple }}/release/fbootd" "dist/fbootd-${{ matrix.target }}"

      - name: Build .deb package
        run: |
          # Tag pushes give e.g. v0.1.0 -> 0.1.0; other refs fall back to 0.0.0.
          version="${GITHUB_REF_NAME#v}"
          case "$version" in
            [0-9]*) ;;
            *) version=0.0.0 ;;
          esac
          ./packaging/deb/build-deb.sh \
            "dist/fbootd-${{ matrix.target }}" \
            "${{ matrix.deb_arch }}" \
            "$version" \
            dist

      - uses: actions/upload-artifact@v4
        with:
          name: fbootd-${{ matrix.target }}
          path: |
            dist/fbootd-${{ matrix.target }}
            dist/fbootd_*_${{ matrix.deb_arch }}.deb
          if-no-files-found: error

      - name: Publish to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/fbootd-${{ matrix.target }}
            dist/fbootd_*_${{ matrix.deb_arch }}.deb
